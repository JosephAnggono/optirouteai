services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: optirouteai-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/src
    command: >
      uvicorn optirouteai.api.main:app
      --host 0.0.0.0
      --port 8000

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: optirouteai-dashboard
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app/src
    command: >
      streamlit run app/streamlit_dashboard.py
      --server.address 0.0.0.0
      --server.port 8501
      --server.headless true
    depends_on:
      - api